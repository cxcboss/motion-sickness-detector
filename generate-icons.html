<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas){
  const ctx=canvas.getContext('2d');
  const s=canvas.width;
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,s,s);
  ctx.strokeStyle='#00c853';
  ctx.lineWidth=s*0.02;
  ctx.beginPath();
  ctx.moveTo(s*0.3,s*0.3);
  ctx.lineTo(s*0.3+s*0.06,s*0.7);
  ctx.quadraticCurveTo(s*0.5,s*0.76,s*0.7-s*0.06,s*0.7);
  ctx.lineTo(s*0.7,s*0.3);
  ctx.stroke();
  ctx.fillStyle='#00c853';
  ctx.font=`${s*0.12}px sans-serif`;
  ctx.textAlign='center';
  ctx.fillText('晕',s*0.5,s*0.55);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
